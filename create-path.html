<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<title>Create Path — FitPath</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#1A1714;--bg2:#211C18;--bg3:#2A2420;--bg4:#302A25;--border:#3D3028;--border2:#4a3a2e;--text:#D4CCC4;--text2:#8A7F76;--text-head:#EDE8E2;--accent:#CF7B4B;--green:#9DC499;--font:'Lora',Georgia,serif;--mono:'Geist Mono',monospace;}
  html{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.75;min-height:100vh;}
  a{color:inherit;text-decoration:none;}button{cursor:pointer;font-family:var(--font);}
  input,textarea,select{font-family:var(--font);}
  ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const ICONS = ["◈","◉","◆","⬡","▲","◐","◑","❖","⬟","⬠"];
const COLORS = ["#CF7B4B","#9DC499","#D4CCC4","#8A5230","#8A7F76","#EDE8E2","#6b9fa8","#a88a6b","#7a9e7a","#9a7ab4"];
const EXISTING_CATEGORIES = ["Training Paths","Skill Paths","Best Practices"];

const STEPS = ["Basic Info","Category","Topics","Preview"];

/* ─── Small UI helpers ─── */
function Label({ children }) {
  return <label style={{ display:"block", fontSize:12.5, color:"var(--text2)", marginBottom:6, fontWeight:500 }}>{children}</label>;
}

function TextInput({ value, onChange, placeholder, maxLength }) {
  const [focused, setFocused] = useState(false);
  return (
    <input value={value} onChange={e => onChange(e.target.value)}
      placeholder={placeholder} maxLength={maxLength}
      onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
      style={{
        width:"100%", background:"var(--bg3)", border:`1px solid ${focused?"var(--accent)":"var(--border)"}`,
        borderRadius:9, padding:"11px 14px", color:"var(--text-head)", fontSize:14.5, outline:"none", transition:"border-color .15s",
      }}
    />
  );
}

function TextArea({ value, onChange, placeholder, rows=3 }) {
  const [focused, setFocused] = useState(false);
  return (
    <textarea value={value} onChange={e => onChange(e.target.value)}
      placeholder={placeholder} rows={rows}
      onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
      style={{
        width:"100%", background:"var(--bg3)", border:`1px solid ${focused?"var(--accent)":"var(--border)"}`,
        borderRadius:9, padding:"11px 14px", color:"var(--text-head)", fontSize:14, outline:"none",
        resize:"vertical", transition:"border-color .15s", lineHeight:1.6,
      }}
    />
  );
}

/* ─── Step indicator ─── */
function StepBar({ current }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:0, marginBottom:40 }}>
      {STEPS.map((s, i) => (
        <React.Fragment key={s}>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
            <div style={{
              width:32, height:32, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:13, fontWeight:700,
              background: i < current ? "var(--green)" : i === current ? "var(--accent)" : "var(--bg3)",
              color: i <= current ? "#1A1714" : "var(--text2)",
              border: i > current ? "1px solid var(--border)" : "none",
              transition:"all .3s",
            }}>
              {i < current ? "✓" : i + 1}
            </div>
            <span style={{ fontSize:11.5, color: i === current ? "var(--accent)" : i < current ? "var(--green)" : "var(--text2)", fontWeight: i === current ? 600 : 400, whiteSpace:"nowrap" }}>{s}</span>
          </div>
          {i < STEPS.length - 1 && (
            <div style={{ flex:1, height:1, background: i < current ? "var(--green)" : "var(--border)", margin:"0 8px", marginBottom:22, transition:"background .3s" }} />
          )}
        </React.Fragment>
      ))}
    </div>
  );
}

/* ─── Step 1: Basic Info ─── */
function Step1({ form, setForm }) {
  return (
    <div style={{ animation:"slideIn .25s ease" }}>
      <h2 style={{ fontSize:20, fontWeight:700, color:"var(--text-head)", marginBottom:6 }}>Basic Information</h2>
      <p style={{ fontSize:13.5, color:"var(--text2)", marginBottom:28, lineHeight:1.65 }}>Give your path a clear title and a short description so others know what it covers.</p>

      <div style={{ marginBottom:20 }}>
        <Label>Path Title *</Label>
        <TextInput value={form.title} onChange={v => setForm(f => ({...f, title:v}))} placeholder="e.g. 8-Week Marathon Training" maxLength={60} />
        <div style={{ textAlign:"right", fontSize:11, color:"var(--text2)", marginTop:4 }}>{form.title.length}/60</div>
      </div>

      <div style={{ marginBottom:24 }}>
        <Label>Short Description *</Label>
        <TextArea value={form.desc} onChange={v => setForm(f => ({...f, desc:v}))} placeholder="e.g. A step-by-step guide to running your first marathon in under 4 hours." rows={2} />
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24 }}>
        <div>
          <Label>Icon</Label>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
            {ICONS.map(icon => (
              <button key={icon} onClick={() => setForm(f => ({...f, icon}))} style={{
                width:40, height:40, borderRadius:9, fontSize:18,
                background: form.icon === icon ? `${form.color}22` : "var(--bg3)",
                border: `1.5px solid ${form.icon === icon ? form.color : "var(--border)"}`,
                color: form.icon === icon ? form.color : "var(--text2)",
                transition:"all .15s",
              }}>{icon}</button>
            ))}
          </div>
        </div>

        <div>
          <Label>Color</Label>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
            {COLORS.map(color => (
              <button key={color} onClick={() => setForm(f => ({...f, color}))} style={{
                width:32, height:32, borderRadius:"50%", background:color, border:"none",
                outline: form.color === color ? "2.5px solid var(--text-head)" : "none",
                outlineOffset:3, cursor:"pointer", transition:"outline .15s",
              }} />
            ))}
          </div>
        </div>
      </div>

      {/* Live preview pill */}
      <div style={{ marginTop:28, padding:"16px 20px", background:"var(--bg2)", border:"1px solid var(--border)", borderRadius:12 }}>
        <div style={{ fontSize:11.5, color:"var(--text2)", marginBottom:10 }}>Preview card</div>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <div style={{ width:44, height:44, background:`${form.color}18`, borderRadius:11, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, color:form.color, flexShrink:0 }}>{form.icon}</div>
          <div>
            <div style={{ fontWeight:700, fontSize:15, color:"var(--text-head)" }}>{form.title || "Path Title"}</div>
            <div style={{ fontSize:12.5, color:"var(--text2)", marginTop:2 }}>{form.desc || "Your description will appear here."}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Step 2: Category ─── */
function Step2({ form, setForm }) {
  const [newCat, setNewCat] = useState("");
  const [mode, setMode] = useState(EXISTING_CATEGORIES.includes(form.category) ? "existing" : form.category ? "new" : "existing");

  const handleNewCat = () => {
    if (newCat.trim()) {
      setForm(f => ({...f, category: newCat.trim(), isNewCategory: true}));
    }
  };

  return (
    <div style={{ animation:"slideIn .25s ease" }}>
      <h2 style={{ fontSize:20, fontWeight:700, color:"var(--text-head)", marginBottom:6 }}>Choose a Category</h2>
      <p style={{ fontSize:13.5, color:"var(--text2)", marginBottom:28, lineHeight:1.65 }}>Pick an existing section or create a brand new category — it'll appear as its own grid on the home page.</p>

      <div style={{ display:"flex", gap:8, marginBottom:24 }}>
        {["existing","new"].map(m => (
          <button key={m} onClick={() => { setMode(m); if(m==="existing") setForm(f=>({...f, category:"", isNewCategory:false})); }} style={{
            flex:1, padding:"10px", borderRadius:9, fontSize:13.5, fontWeight:500,
            background: mode===m ? "rgba(207,123,75,0.12)" : "var(--bg3)",
            border: `1px solid ${mode===m ? "var(--accent)" : "var(--border)"}`,
            color: mode===m ? "var(--accent)" : "var(--text2)", transition:"all .15s",
          }}>{m === "existing" ? "Use existing category" : "Create new category"}</button>
        ))}
      </div>

      {mode === "existing" ? (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {EXISTING_CATEGORIES.map(cat => {
            const saved = JSON.parse(localStorage.getItem("custom_paths") || "[]");
            const selected = form.category === cat && !form.isNewCategory;
            return (
              <button key={cat} onClick={() => setForm(f => ({...f, category:cat, isNewCategory:false}))} style={{
                display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"14px 18px", borderRadius:11, textAlign:"left",
                background: selected ? "rgba(207,123,75,0.1)" : "var(--bg2)",
                border: `1px solid ${selected ? "var(--accent)" : "var(--border)"}`,
                color: selected ? "var(--accent)" : "var(--text-head)", transition:"all .15s",
              }}>
                <span style={{ fontWeight:600, fontSize:14.5 }}>{cat}</span>
                {selected && <span style={{ fontSize:16 }}>✓</span>}
              </button>
            );
          })}

          {(() => {
            const saved = JSON.parse(localStorage.getItem("custom_paths") || "[]");
            const customCats = [...new Set(saved.filter(r=>r.isNewCategory).map(r=>r.category))];
            return customCats.map(cat => {
              const selected = form.category === cat && !form.isNewCategory;
              return (
                <button key={cat} onClick={() => setForm(f => ({...f, category:cat, isNewCategory:false}))} style={{
                  display:"flex", alignItems:"center", justifyContent:"space-between",
                  padding:"14px 18px", borderRadius:11, textAlign:"left",
                  background: selected ? "rgba(207,123,75,0.1)" : "var(--bg2)",
                  border: `1px solid ${selected ? "var(--accent)" : "var(--border)"}`,
                  color: selected ? "var(--accent)" : "var(--text-head)", transition:"all .15s",
                }}>
                  <div>
                    <span style={{ fontWeight:600, fontSize:14.5 }}>{cat}</span>
                    <span style={{ fontSize:11, color:"var(--text2)", marginLeft:8 }}>Custom</span>
                  </div>
                  {selected && <span style={{ fontSize:16 }}>✓</span>}
                </button>
              );
            });
          })()}
        </div>
      ) : (
        <div>
          <Label>New Category Name *</Label>
          <div style={{ display:"flex", gap:10 }}>
            <TextInput value={newCat} onChange={setNewCat} placeholder="e.g. Combat Sports" />
            <button onClick={handleNewCat} style={{
              background:"var(--accent)", color:"#1A1714", border:"none", borderRadius:9,
              padding:"0 20px", fontSize:14, fontWeight:700, flexShrink:0, transition:"background .15s",
            }}
            onMouseEnter={e => e.currentTarget.style.background="#d98a5e"}
            onMouseLeave={e => e.currentTarget.style.background="var(--accent)"}
            >Set</button>
          </div>
          {form.category && form.isNewCategory && (
            <div style={{ marginTop:12, padding:"10px 14px", background:"rgba(157,196,153,0.1)", border:"1px solid rgba(157,196,153,0.25)", borderRadius:9, fontSize:13, color:"var(--green)", display:"flex", alignItems:"center", gap:8 }}>
              <span>✓</span> New category: <strong>"{form.category}"</strong>
            </div>
          )}
          <p style={{ marginTop:12, fontSize:12.5, color:"var(--text2)", lineHeight:1.65 }}>
            A new section will be created on the home page with its own grid. You can add more paths to it later.
          </p>
        </div>
      )}
    </div>
  );
}

/* ─── Step 3: Topics ─── */
function Step3({ form, setForm }) {
  const [newTopic, setNewTopic] = useState("");
  const [newSection, setNewSection] = useState("");

  const addSection = () => {
    if (!newSection.trim()) return;
    setForm(f => ({ ...f, sections: [...(f.sections||[]), { title: newSection.trim(), items:[] }] }));
    setNewSection("");
  };

  const addTopic = (sIdx) => {
    if (!newTopic.trim()) return;
    setForm(f => {
      const sections = [...(f.sections||[])];
      sections[sIdx] = { ...sections[sIdx], items: [...sections[sIdx].items, { id: Date.now()+"", label: newTopic.trim(), status:"none" }] };
      return { ...f, sections };
    });
    setNewTopic("");
  };

  const removeItem = (sIdx, iIdx) => {
    setForm(f => {
      const sections = [...(f.sections||[])];
      sections[sIdx] = { ...sections[sIdx], items: sections[sIdx].items.filter((_,i)=>i!==iIdx) };
      return { ...f, sections };
    });
  };

  const removeSection = (sIdx) => {
    setForm(f => ({ ...f, sections: f.sections.filter((_,i)=>i!==sIdx) }));
  };

  const [activeSec, setActiveSec] = useState(null);
  const [topicInputs, setTopicInputs] = useState({});

  return (
    <div style={{ animation:"slideIn .25s ease" }}>
      <h2 style={{ fontSize:20, fontWeight:700, color:"var(--text-head)", marginBottom:6 }}>Add Topics <span style={{ fontSize:14, fontWeight:400, color:"var(--text2)" }}>(optional)</span></h2>
      <p style={{ fontSize:13.5, color:"var(--text2)", marginBottom:24, lineHeight:1.65 }}>Organise your path into sections and add topics to each. You can always edit this later.</p>

      {/* Add section */}
      <div style={{ marginBottom:20 }}>
        <Label>Add a Section</Label>
        <div style={{ display:"flex", gap:10 }}>
          <TextInput value={newSection} onChange={setNewSection} placeholder="e.g. Foundation Phase" />
          <button onClick={addSection} style={{
            background:"var(--bg2)", color:"var(--text)", border:"1px solid var(--border2)",
            borderRadius:9, padding:"0 18px", fontSize:14, fontWeight:600, flexShrink:0,
          }}>+ Add</button>
        </div>
      </div>

      {/* Sections list */}
      {(!form.sections || form.sections.length === 0) ? (
        <div style={{ padding:"28px", textAlign:"center", background:"var(--bg2)", border:"1px dashed var(--border2)", borderRadius:12, color:"var(--text2)", fontSize:13.5 }}>
          No sections yet — add your first section above.
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {form.sections.map((sec, sIdx) => (
            <div key={sIdx} style={{ background:"var(--bg2)", border:"1px solid var(--border)", borderRadius:12, overflow:"hidden" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px", borderBottom: sec.items.length > 0 || activeSec===sIdx ? "1px solid var(--border)" : "none" }}>
                <div style={{ width:8, height:8, borderRadius:2, background:form.color, flexShrink:0 }} />
                <span style={{ fontWeight:600, fontSize:14, color:"var(--text-head)", flex:1 }}>{sec.title}</span>
                <span style={{ fontSize:12, color:"var(--text2)" }}>{sec.items.length} topics</span>
                <button onClick={() => setActiveSec(activeSec===sIdx?null:sIdx)} style={{ background:"none", border:"none", color:"var(--text2)", fontSize:13, padding:"4px 8px" }}>
                  {activeSec===sIdx ? "Done" : "+ Topic"}
                </button>
                <button onClick={() => removeSection(sIdx)} style={{ background:"none", border:"none", color:"#8A5230", fontSize:14, padding:"4px" }}>✕</button>
              </div>

              {sec.items.map((item, iIdx) => (
                <div key={item.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 16px", borderBottom:"1px solid var(--border)" }}>
                  <div style={{ width:14, height:14, borderRadius:3, border:"1px solid var(--border2)", flexShrink:0 }} />
                  <span style={{ flex:1, fontSize:13.5, color:"var(--text)" }}>{item.label}</span>
                  <button onClick={() => removeItem(sIdx, iIdx)} style={{ background:"none", border:"none", color:"var(--text2)", fontSize:12, padding:"2px 6px", cursor:"pointer" }}>✕</button>
                </div>
              ))}

              {activeSec === sIdx && (
                <div style={{ padding:"10px 16px", display:"flex", gap:8 }}>
                  <input
                    value={topicInputs[sIdx]||""}
                    onChange={e => setTopicInputs(t=>({...t,[sIdx]:e.target.value}))}
                    onKeyDown={e => { if(e.key==="Enter"){ setForm(f=>{const sections=[...(f.sections||[])];sections[sIdx]={...sections[sIdx],items:[...sections[sIdx].items,{id:Date.now()+"",label:(topicInputs[sIdx]||"").trim(),status:"none"}]};return{...f,sections};});setTopicInputs(t=>({...t,[sIdx]:""})); } }}
                    placeholder="Topic name, press Enter"
                    autoFocus
                    style={{ flex:1, background:"var(--bg3)", border:"1px solid var(--accent)", borderRadius:7, padding:"8px 12px", color:"var(--text-head)", fontSize:13.5, outline:"none", fontFamily:"var(--font)" }}
                  />
                  <button onClick={() => { setForm(f=>{const sections=[...(f.sections||[])];sections[sIdx]={...sections[sIdx],items:[...sections[sIdx].items,{id:Date.now()+"",label:(topicInputs[sIdx]||"").trim(),status:"none"}]};return{...f,sections};});setTopicInputs(t=>({...t,[sIdx]:""})); }} style={{ background:"var(--accent)", color:"#1A1714", border:"none", borderRadius:7, padding:"0 14px", fontWeight:700, fontSize:13 }}>Add</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── Step 4: Preview ─── */
function Step4({ form }) {
  const categoryLabel = form.isNewCategory ? `${form.category} (new)` : form.category;
  const totalTopics = (form.sections||[]).reduce((s,sec)=>s+sec.items.length,0);
  return (
    <div style={{ animation:"slideIn .25s ease" }}>
      <h2 style={{ fontSize:20, fontWeight:700, color:"var(--text-head)", marginBottom:6 }}>Preview & Publish</h2>
      <p style={{ fontSize:13.5, color:"var(--text2)", marginBottom:28 }}>Here's how your path will look. Hit Publish to add it to the home page.</p>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:11.5, color:"var(--text2)", marginBottom:10 }}>Card preview</div>
        <div style={{
          padding:"24px", background:"var(--bg2)", border:`1px solid ${form.color}44`,
          borderRadius:14, position:"relative", overflow:"hidden",
          boxShadow:`0 4px 24px ${form.color}14`,
        }}>
          <span style={{ position:"absolute", right:12, bottom:8, fontSize:72, color:form.color, opacity:0.07, lineHeight:1 }}>{form.icon}</span>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
            <div style={{ width:48, height:48, background:`${form.color}18`, borderRadius:12, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, color:form.color }}>{form.icon}</div>
            <span style={{ fontSize:10.5, background:`${form.color}18`, color:form.color, padding:"3px 8px", borderRadius:20, fontWeight:600, border:`1px solid ${form.color}33` }}>Custom</span>
          </div>
          <div style={{ fontWeight:700, fontSize:16, color:"var(--text-head)", marginBottom:6 }}>{form.title}</div>
          <div style={{ fontSize:13, color:"var(--text2)", lineHeight:1.6 }}>{form.desc}</div>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:20 }}>
        {[
          { label:"Category", value: categoryLabel || "—" },
          { label:"Sections", value: (form.sections||[]).length },
          { label:"Total topics", value: totalTopics },
          { label:"Visibility", value:"Public (home page)" },
        ].map(s => (
          <div key={s.label} style={{ background:"var(--bg2)", border:"1px solid var(--border)", borderRadius:10, padding:"12px 16px" }}>
            <div style={{ fontSize:11.5, color:"var(--text2)", marginBottom:4 }}>{s.label}</div>
            <div style={{ fontSize:14, fontWeight:600, color:"var(--text-head)" }}>{s.value}</div>
          </div>
        ))}
      </div>

      {form.isNewCategory && (
        <div style={{ padding:"12px 16px", background:"rgba(157,196,153,0.08)", border:"1px solid rgba(157,196,153,0.2)", borderRadius:10, fontSize:13, color:"var(--green)", lineHeight:1.65 }}>
          ✓ A new <strong>"{form.category}"</strong> section will be created on the home page with its own grid.
        </div>
      )}
    </div>
  );
}

/* ─── NavBar ─── */
function NavBar() {
  return (
    <nav style={{ position:"sticky", top:0, zIndex:100, background:"rgba(26,23,20,0.9)", backdropFilter:"blur(12px)", borderBottom:"1px solid var(--border)" }}>
      <div style={{ maxWidth:860, margin:"0 auto", padding:"0 24px", height:56, display:"flex", alignItems:"center", gap:12 }}>
        <a href="path.html" style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:30, height:30, background:"var(--accent)", borderRadius:7, display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:800, color:"#1A1714" }}>💪</div>
          <span style={{ fontWeight:700, fontSize:16, color:"var(--text-head)" }}>FitPath</span>
        </a>
        <span style={{ color:"var(--border2)", fontSize:18 }}>/</span>
        <span style={{ fontSize:13.5, color:"var(--text2)" }}>Create Path</span>
      </div>
    </nav>
  );
}

/* ─── Main App ─── */
const DEFAULT_FORM = { title:"", desc:"", icon:"◈", color:"#CF7B4B", category:"", isNewCategory:false, sections:[] };

function App() {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState(DEFAULT_FORM);
  const [published, setPublished] = useState(false);

  const canNext = () => {
    if (step === 0) return form.title.trim().length > 0 && form.desc.trim().length > 0;
    if (step === 1) return form.category.trim().length > 0;
    return true;
  };

  const publish = () => {
    const existing = JSON.parse(localStorage.getItem("custom_paths") || "[]");
    const newPath = {
      id: `custom-${Date.now()}`,
      title: form.title,
      desc: form.desc,
      icon: form.icon,
      color: form.color,
      category: form.category,
      isNewCategory: form.isNewCategory,
      sections: form.sections,
      createdAt: new Date().toISOString(),
    };
    localStorage.setItem("custom_paths", JSON.stringify([...existing, newPath]));
    setPublished(true);
  };

  if (published) {
    return (
      <>
        <NavBar />
        <div style={{ maxWidth:500, margin:"80px auto", padding:"0 24px", textAlign:"center", animation:"fadeInUp .3s ease" }}>
          <div style={{ fontSize:56, marginBottom:20, color:"var(--green)" }}>✓</div>
          <h1 style={{ fontSize:26, fontWeight:700, color:"var(--text-head)", marginBottom:10 }}>Path Published!</h1>
          <p style={{ fontSize:14.5, color:"var(--text2)", lineHeight:1.75, marginBottom:32 }}>
            <strong style={{ color:"var(--text-head)" }}>"{form.title}"</strong> has been added to the
            {form.isNewCategory ? ` new "${form.category}"` : ` "${form.category}"`} section on the home page.
          </p>
          <div style={{ display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap" }}>
            <a href="path.html" style={{ background:"var(--accent)", color:"#1A1714", fontWeight:700, fontSize:14, padding:"12px 28px", borderRadius:10 }}>View on Home Page →</a>
            <button onClick={() => { setForm(DEFAULT_FORM); setStep(0); setPublished(false); }} style={{ background:"var(--bg2)", color:"var(--text)", border:"1px solid var(--border2)", borderRadius:10, padding:"12px 20px", fontSize:14, fontWeight:500 }}>Create Another</button>
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <NavBar />
      <div style={{ maxWidth:620, margin:"0 auto", padding:"48px 24px 80px", animation:"fadeInUp .3s ease" }}>
        <StepBar current={step} />

        <div style={{ background:"var(--bg2)", border:"1px solid var(--border)", borderRadius:16, padding:"32px" }}>
          {step === 0 && <Step1 form={form} setForm={setForm} />}
          {step === 1 && <Step2 form={form} setForm={setForm} />}
          {step === 2 && <Step3 form={form} setForm={setForm} />}
          {step === 3 && <Step4 form={form} />}

          <div style={{ display:"flex", justifyContent:"space-between", marginTop:32, paddingTop:24, borderTop:"1px solid var(--border)" }}>
            <button onClick={() => step > 0 ? setStep(s => s-1) : window.location.href="path.html"} style={{
              background:"none", border:"1px solid var(--border2)", borderRadius:9, padding:"10px 20px",
              color:"var(--text2)", fontSize:14, transition:"all .15s",
            }}
            onMouseEnter={e => e.currentTarget.style.color="var(--text)"}
            onMouseLeave={e => e.currentTarget.style.color="var(--text2)"}
            >{step === 0 ? "← Cancel" : "← Back"}</button>

            {step < STEPS.length - 1 ? (
              <button onClick={() => canNext() && setStep(s => s+1)} style={{
                background: canNext() ? "var(--accent)" : "var(--bg3)",
                color: canNext() ? "#1A1714" : "var(--text2)",
                border:"none", borderRadius:9, padding:"10px 24px",
                fontSize:14, fontWeight:700, transition:"all .15s",
                cursor: canNext() ? "pointer" : "not-allowed",
              }}>Continue →</button>
            ) : (
              <button onClick={publish} style={{
                background:"var(--accent)", color:"#1A1714", border:"none",
                borderRadius:9, padding:"10px 28px", fontSize:14, fontWeight:700,
              }}
              onMouseEnter={e => e.currentTarget.style.background="#d98a5e"}
              onMouseLeave={e => e.currentTarget.style.background="var(--accent)"}
              >🚀 Publish Path</button>
            )}
          </div>
        </div>

        <p style={{ textAlign:"center", fontSize:12, color:"var(--text2)", marginTop:16 }}>
          Step {step+1} of {STEPS.length} · {STEPS[step]}
        </p>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
