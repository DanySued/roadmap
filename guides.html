<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <title>Guides — FitPath</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #1a1714;
        --bg2: #211c18;
        --bg3: #2a2420;
        --bg4: #302a25;
        --border: #3d3028;
        --border2: #4a3a2e;
        --text: #d4ccc4;
        --text2: #8a7f76;
        --text-head: #ede8e2;
        --accent: #cf7b4b;
        --green: #9dc499;
        --font: "Lora", Georgia, serif;
        --mono: "Geist Mono", monospace;
      }
      html {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.75;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--bg4);
        border-radius: 3px;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="shared.js"></script>
    <script type="text/babel">
      const { useState } = React;

      const CATEGORIES = [
        "All",
        "Strength",
        "Cardio",
        "Nutrition",
        "Recovery",
        "Mindset",
      ];

      const GUIDES = [
        {
          id: 1,
          title: "The Complete Guide to Strength Training Form",
          cat: "Strength",
          read: "12 min",
          date: "Apr 2024",
          color: "#CF7B4B",
          icon: "◈",
          featured: true,
          desc: "Master the fundamentals: proper squat form, deadlift setup, bench press technique, and common mistakes that kill gains.",
        },
        {
          id: 2,
          title: "Running Shoes: How to Find Your Perfect Pair",
          cat: "Cardio",
          read: "10 min",
          date: "Mar 2024",
          color: "#9DC499",
          icon: "◉",
          featured: true,
          desc: "Understand pronation, arch support, and shoe categories to find the perfect fit for your running style and injuries.",
        },
        {
          id: 3,
          title: "Nutrition for Muscle Growth: Calories and Macros",
          cat: "Nutrition",
          read: "14 min",
          date: "Mar 2024",
          color: "#D4CCC4",
          icon: "◆",
          featured: true,
          desc: "Science-backed breakdown of how many calories you need, optimal protein intake, and timing for maximum muscle growth.",
        },
        {
          id: 4,
          title: "HIIT vs Steady State Cardio: Which is Better?",
          cat: "Cardio",
          read: "8 min",
          date: "Feb 2024",
          color: "#CF7B4B",
          icon: "⬡",
          desc: "Compare interval training and steady-state cardio with real research on fat loss, fitness gains, and recovery.",
        },
        {
          id: 5,
          title: "The Science of Recovery: Sleep, Stretching, and Rest Days",
          cat: "Recovery",
          read: "11 min",
          date: "Feb 2024",
          color: "#8A5230",
          icon: "◈",
          desc: "Why rest matters as much as training — sleep cycles, active recovery, and when you actually need a deload week.",
        },
        {
          id: 6,
          title: "Starting a Running Program: Couch to 5K Explained",
          cat: "Cardio",
          read: "9 min",
          date: "Jan 2024",
          color: "#9DC499",
          icon: "⬡",
          desc: "Complete beginner's plan to run your first 5K without injury — periodization, pace zones, and injury prevention.",
        },
        {
          id: 7,
          title: "Nutrition for Weight Loss: Sustainable Strategies",
          cat: "Nutrition",
          read: "13 min",
          date: "Jan 2024",
          color: "#CF7B4B",
          icon: "◉",
          desc: "How to create a calorie deficit that works, avoid muscle loss while losing fat, and maintain it long-term.",
        },
        {
          id: 8,
          title: "Progressive Overload: The Secret to Continuous Gains",
          cat: "Strength",
          read: "10 min",
          date: "Dec 2023",
          color: "#D4CCC4",
          icon: "◆",
          desc: "Master the principle that drives strength gains — how to increase weight, volume, or intensity systematically.",
        },
        {
          id: 9,
          title: "Injury Recovery: Return to Training Safely",
          cat: "Recovery",
          read: "12 min",
          date: "Dec 2023",
          color: "#8A5230",
          icon: "⬡",
          desc: "Phases of injury recovery, when to resume training, prehab exercises, and avoiding re-injury.",
        },
        {
          id: 10,
          title: "Mindset and Motivation: Staying Consistent Long-Term",
          cat: "Mindset",
          read: "7 min",
          date: "Nov 2023",
          color: "#9DC499",
          icon: "◈",
          desc: "Psychological strategies to stay committed, overcome plateaus, and build fitness habits that last years.",
        },
        {
          id: 11,
          title: "Pre- and Post-Workout Nutrition: Timing Matters",
          cat: "Nutrition",
          read: "9 min",
          date: "Nov 2023",
          color: "#CF7B4B",
          icon: "◉",
          desc: "What to eat before and after training, meal timing, and how to fuel performance and recovery.",
        },
        {
          id: 12,
          title: "Plateaus and Deloads: When Rest Leads to Growth",
          cat: "Strength",
          read: "11 min",
          date: "Oct 2023",
          color: "#D4CCC4",
          icon: "⬡",
          desc: "Recognize when you've hit a plateau, the science of deloads, and how to come back stronger.",
        },
      ];

      function App() {
        const [cat, setCat] = useState("All");
        const featured = GUIDES.filter((g) => g.featured);
        const filtered = (
          cat === "All" ? GUIDES : GUIDES.filter((g) => g.cat === cat)
        ).filter((g) => !g.featured);

        return (
          <>
            <NavBar />
            <main
              style={{
                maxWidth: 1100,
                margin: "0 auto",
                padding: "48px 24px 60px",
                animation: "fadeInUp .35s ease",
              }}
            >
              <div style={{ marginBottom: 36 }}>
                <h1
                  style={{
                    fontSize: 36,
                    fontWeight: 700,
                    color: "var(--text-head)",
                    letterSpacing: "-0.5px",
                    marginBottom: 10,
                  }}
                >
                  Guides
                </h1>
                <p
                  style={{
                    fontSize: 15,
                    color: "var(--text2)",
                    maxWidth: 480,
                    lineHeight: 1.75,
                  }}
                >
                  In-depth articles written by practitioners. Learn concepts,
                  patterns and workflows that matter.
                </p>
              </div>

              {/* Featured */}
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(3,1fr)",
                  gap: 14,
                  marginBottom: 40,
                }}
              >
                {featured.map((g) => {
                  const [hov, setHov] = useState(false);
                  return (
                    <a
                      key={g.id}
                      href="guide-detail.html"
                      onMouseEnter={() => setHov(true)}
                      onMouseLeave={() => setHov(false)}
                      style={{
                        display: "block",
                        background: hov ? "var(--bg3)" : "var(--bg2)",
                        border: `1px solid ${hov ? g.color + "55" : "var(--border)"}`,
                        borderRadius: 14,
                        padding: "24px",
                        transition: "all .2s",
                        position: "relative",
                        overflow: "hidden",
                      }}
                    >
                      <div
                        style={{
                          position: "absolute",
                          right: -10,
                          bottom: -10,
                          fontSize: 80,
                          color: g.color,
                          opacity: 0.06,
                          lineHeight: 1,
                        }}
                      >
                        {g.icon}
                      </div>
                      <div
                        style={{
                          fontSize: 11,
                          color: g.color,
                          fontWeight: 600,
                          marginBottom: 8,
                          textTransform: "uppercase",
                          letterSpacing: "0.05em",
                        }}
                      >
                        Featured · {g.cat}
                      </div>
                      <h3
                        style={{
                          fontSize: 16,
                          fontWeight: 700,
                          color: "var(--text-head)",
                          marginBottom: 10,
                          lineHeight: 1.4,
                        }}
                      >
                        {g.title}
                      </h3>
                      <p
                        style={{
                          fontSize: 13,
                          color: "var(--text2)",
                          lineHeight: 1.65,
                          marginBottom: 14,
                          display: "-webkit-box",
                          WebkitLineClamp: 3,
                          WebkitBoxOrient: "vertical",
                          overflow: "hidden",
                        }}
                      >
                        {g.desc}
                      </p>
                      <div
                        style={{
                          display: "flex",
                          justifyContent: "space-between",
                          fontSize: 12,
                          color: "var(--text2)",
                        }}
                      >
                        <span>{g.read} read</span>
                        <span>{g.date}</span>
                      </div>
                    </a>
                  );
                })}
              </div>

              {/* Filter */}
              <div
                style={{
                  display: "flex",
                  gap: 8,
                  marginBottom: 24,
                  flexWrap: "wrap",
                }}
              >
                {CATEGORIES.map((c) => (
                  <button
                    key={c}
                    onClick={() => setCat(c)}
                    style={{
                      padding: "6px 16px",
                      borderRadius: 20,
                      fontSize: 13,
                      fontWeight: 500,
                      cursor: "pointer",
                      background: cat === c ? "var(--accent)" : "var(--bg2)",
                      color: cat === c ? "#1A1714" : "var(--text2)",
                      border: `1px solid ${cat === c ? "var(--accent)" : "var(--border)"}`,
                      transition: "all .15s",
                      fontFamily: "var(--font)",
                    }}
                  >
                    {c}
                  </button>
                ))}
              </div>

              {/* List */}
              <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                {filtered.map((g) => {
                  const [hov, setHov] = useState(false);
                  return (
                    <a
                      key={g.id}
                      href="guide-detail.html"
                      onMouseEnter={() => setHov(true)}
                      onMouseLeave={() => setHov(false)}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: 16,
                        padding: "16px 18px",
                        background: hov ? "var(--bg2)" : "transparent",
                        borderRadius: 10,
                        transition: "background .15s",
                      }}
                    >
                      <div
                        style={{
                          width: 36,
                          height: 36,
                          background: `${g.color}18`,
                          borderRadius: 9,
                          display: "flex",
                          alignItems: "center",
                          justifyContent: "center",
                          fontSize: 16,
                          color: g.color,
                          flexShrink: 0,
                        }}
                      >
                        {g.icon}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div
                          style={{
                            fontWeight: 600,
                            fontSize: 14.5,
                            color: "var(--text-head)",
                            marginBottom: 2,
                          }}
                        >
                          {g.title}
                        </div>
                        <div
                          style={{
                            fontSize: 12.5,
                            color: "var(--text2)",
                            overflow: "hidden",
                            textOverflow: "ellipsis",
                            whiteSpace: "nowrap",
                          }}
                        >
                          {g.desc}
                        </div>
                      </div>
                      <div style={{ textAlign: "right", flexShrink: 0 }}>
                        <div
                          style={{
                            fontSize: 11.5,
                            color: g.color,
                            fontWeight: 500,
                            marginBottom: 2,
                          }}
                        >
                          {g.cat}
                        </div>
                        <div style={{ fontSize: 11, color: "var(--text2)" }}>
                          {g.read} · {g.date}
                        </div>
                      </div>
                    </a>
                  );
                })}
              </div>
            </main>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
