<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <title>Reset Password — FitPath.dev</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #1a1714;
        --bg2: #211c18;
        --bg3: #2a2420;
        --border: #3d3028;
        --text: #d4ccc4;
        --text2: #8a7f76;
        --text-head: #ede8e2;
        --accent: #cf7b4b;
        --font: "Lora", Georgia, serif;
      }
      html {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;

      function ForgotPassword() {
        const [email, setEmail] = useState("");
        const [step, setStep] = useState("email");

        const handleSubmit = (e) => {
          e.preventDefault();
          if (email.includes("@")) {
            setStep("sent");
          }
        };

        return (
          <div
            style={{
              minHeight: "100vh",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              padding: 24,
            }}
          >
            <div
              style={{
                maxWidth: 420,
                width: "100%",
                animation: "fadeInUp .4s ease",
              }}
            >
              <div style={{ marginBottom: 32, textAlign: "center" }}>
                <a
                  href="roadmap.html"
                  style={{
                    display: "inline-flex",
                    alignItems: "center",
                    gap: 10,
                    marginBottom: 32,
                  }}
                >
                  <div
                    style={{
                      width: 32,
                      height: 32,
                      background: "var(--accent)",
                      borderRadius: 8,
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      fontSize: 16,
                      fontWeight: 800,
                      color: "#0f1117",
                    }}
                  >
                    R
                  </div>
                  <span style={{ fontWeight: 700, fontSize: 17 }}>
                    FitPath.dev
                  </span>
                </a>
              </div>

              {step === "email" ? (
                <>
                  <h1
                    style={{
                      fontSize: 24,
                      fontWeight: 700,
                      color: "var(--text-head)",
                      marginBottom: 8,
                    }}
                  >
                    Reset your password
                  </h1>
                  <p
                    style={{
                      fontSize: 13.5,
                      color: "var(--text2)",
                      marginBottom: 28,
                      lineHeight: 1.7,
                    }}
                  >
                    Enter your email address and we'll send you a link to reset
                    your password.
                  </p>

                  <form onSubmit={handleSubmit}>
                    <div style={{ marginBottom: 20 }}>
                      <label
                        style={{
                          display: "block",
                          fontSize: 13,
                          color: "var(--text2)",
                          marginBottom: 8,
                          fontWeight: 500,
                        }}
                      >
                        Email address
                      </label>
                      <input
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        placeholder="you@example.com"
                        style={{
                          width: "100%",
                          padding: "11px 14px",
                          background: "var(--bg3)",
                          border: "1px solid var(--border)",
                          borderRadius: 9,
                          color: "var(--text-head)",
                          fontSize: 14,
                          fontFamily: "var(--font)",
                          outline: "none",
                        }}
                      />
                    </div>

                    <button
                      type="submit"
                      style={{
                        width: "100%",
                        padding: "11px",
                        background: "var(--accent)",
                        color: "#0f1117",
                        border: "none",
                        borderRadius: 9,
                        fontWeight: 700,
                        fontSize: 14,
                        cursor: "pointer",
                        transition: "background .2s",
                      }}
                      onMouseEnter={(e) =>
                        (e.currentTarget.style.background = "#d98a5e")
                      }
                      onMouseLeave={(e) =>
                        (e.currentTarget.style.background = "var(--accent)")
                      }
                    >
                      Send reset link
                    </button>
                  </form>

                  <div style={{ marginTop: 20, textAlign: "center" }}>
                    <a
                      href="auth.html"
                      style={{ fontSize: 13.5, color: "var(--accent)" }}
                    >
                      Back to sign in
                    </a>
                  </div>
                </>
              ) : (
                <>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 48, marginBottom: 16 }}>✓</div>
                    <h1
                      style={{
                        fontSize: 24,
                        fontWeight: 700,
                        color: "var(--text-head)",
                        marginBottom: 8,
                      }}
                    >
                      Check your email
                    </h1>
                    <p
                      style={{
                        fontSize: 13.5,
                        color: "var(--text2)",
                        marginBottom: 32,
                        lineHeight: 1.7,
                      }}
                    >
                      We've sent a password reset link to{" "}
                      <strong style={{ color: "var(--text-head)" }}>
                        {email}
                      </strong>
                      . Click the link in the email to set a new password.
                    </p>
                    <a
                      href="auth.html"
                      style={{
                        display: "inline-block",
                        padding: "10px 24px",
                        background: "var(--accent)",
                        color: "#0f1717",
                        borderRadius: 9,
                        fontWeight: 700,
                        fontSize: 14,
                      }}
                    >
                      Back to sign in
                    </a>
                  </div>
                </>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <ForgotPassword />,
      );
    </script>
  </body>
</html>
