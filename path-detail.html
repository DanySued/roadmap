<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <title>Fitness Training Path - FitPath.dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.0/confetti.min.js"></script>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #1a1714;
        --bg2: #211c18;
        --bg3: #2a2420;
        --border: #3d3028;
        --border2: #4a3a2e;
        --text: #d4ccc4;
        --text2: #8a7f76;
        --text-head: #ede8e2;
        --accent: #cf7b4b;
        --green: #9dc499;
      }
      html {
        font-family: "Lora", Georgia, serif;
        background: var(--bg);
        color: var(--text);
        scroll-behavior: smooth;
        font-size: 15px;
        line-height: 1.75;
      }
      body {
        min-height: 100vh;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      button {
        cursor: pointer;
        font-family: inherit;
      }

      /* Encouragement Toast */
      .encouragement-toast {
        position: fixed;
        top: 20px;
        right: 20px;
        background: var(--bg2);
        border: 1px solid var(--border2);
        border-radius: 12px;
        padding: 16px 24px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        animation: slideIn 0.3s ease;
        z-index: 1000;
        max-width: 300px;
      }
      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      .encouragement-toast h3 {
        font-size: 16px;
        color: var(--accent);
        margin-bottom: 4px;
        font-weight: 700;
      }
      .encouragement-toast p {
        font-size: 13px;
        color: var(--text2);
      }

      /* Main layout */
      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(26,23,20,0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 12px 24px;
      }
      nav a {
        font-weight: 600;
        color: var(--text);
        font-size: 14px;
      }

      main {
        max-width: 1000px;
        margin: 0 auto;
        padding: 40px 24px;
      }

      .header {
        margin-bottom: 40px;
      }
      .header h1 {
        font-size: 36px;
        font-weight: 700;
        margin-bottom: 12px;
        color: var(--text-head);
      }
      .header p {
        font-size: 16px;
        color: var(--text2);
      }

      .tasks {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .task {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
        transition: all 0.2s;
        display: flex;
        align-items: flex-start;
        gap: 14px;
      }
      .task:hover {
        border-color: var(--border2);
      }
      .task.completed {
        border-color: var(--green);
        background: rgba(157,196,153,0.05);
        opacity: 0.7;
      }

      .task-checkbox {
        width: 24px;
        height: 24px;
        min-width: 24px;
        border: 2px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 2px;
        transition: all 0.2s;
        background: var(--bg);
      }
      .task-checkbox:hover {
        border-color: var(--accent);
      }
      .task.completed .task-checkbox {
        background: var(--green);
        border-color: var(--green);
        color: white;
        font-weight: bold;
      }

      .task-content {
        flex: 1;
      }
      .task-content h3 {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-head);
        margin-bottom: 4px;
      }
      .task-content p {
        font-size: 13px;
        color: var(--text2);
      }

      .progress-section {
        margin: 40px 0;
      }
      .progress-bar {
        background: var(--bg2);
        border-radius: 8px;
        height: 8px;
        overflow: hidden;
        margin-bottom: 8px;
      }
      .progress-fill {
        background: var(--green);
        height: 100%;
        transition: width 0.3s ease;
      }
      .progress-text {
        font-size: 13px;
        color: var(--text2);
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="path.html">← Back to Paths</a>
    </nav>
    <main id="root"></main>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const PATH_DATA = {
        "strength-training": {
          title: "Strength Training",
          desc: "Build muscle and progressive strength through resistance training",
          icon: "💪",
          tasks: [
            { id: 1, title: "Learn proper form fundamentals", desc: "Master squats, deadlifts, and bench press form with light weights" },
            { id: 2, title: "Build baseline strength", desc: "Establish your 1RM (one-rep max) for compound lifts" },
            { id: 3, title: "Progressive overload week 1-4", desc: "Increase weight by 2-5% every week, 3-4 sessions per week" },
            { id: 4, title: "Hypertrophy phase (6-12 reps)", desc: "Train with moderate weight for 6-12 rep ranges to build muscle" },
            { id: 5, title: "Strength phase (3-6 reps)", desc: "Lower reps, higher weight to build pure strength" },
            { id: 6, title: "Advanced programming", desc: "Implement periodization and periodized training cycles" },
            { id: 7, title: "Peak strength (competition prep)", desc: "Test and demonstrate maximum strength capabilities" },
          ],
        },
        "running": {
          title: "Running",
          desc: "Training progression from beginner to marathon runner",
          icon: "🏃",
          tasks: [
            { id: 1, title: "Start with walk/run intervals", desc: "Alternate 1 minute running with 2 minutes walking for 20 minutes, 3x per week" },
            { id: 2, title: "Build to continuous 5K", desc: "Progress to running 5K (3.1 miles) continuously without stopping" },
            { id: 3, title: "5K speed work", desc: "Add tempo runs and interval training to improve pace" },
            { id: 4, title: "Build weekly mileage", desc: "Gradually increase weekly running volume to 20-30 miles per week" },
            { id: 5, title: "Half marathon training", desc: "Follow 10-12 week half marathon training plan" },
            { id: 6, title: "Marathon base building", desc: "Build aerobic base with long runs and consistent weekly training" },
            { id: 7, title: "Marathon race prep", desc: "Complete 16-week marathon training plan and race day execution" },
          ],
        },
        "yoga": {
          title: "Yoga",
          desc: "Yoga journey from basics to advanced asanas and mindfulness",
          icon: "🧘",
          tasks: [
            { id: 1, title: "Learn fundamental poses", desc: "Mountain pose, downward dog, cat-cow, child's pose - 10 min daily" },
            { id: 2, title: "Build flexibility", desc: "Hold stretches longer, practice gentle flows 3x per week" },
            { id: 3, title: "Breath work (pranayama)", desc: "Master ujjayi breathing, box breathing, and alternate nostril breathing" },
            { id: 4, title: "Sun salutations mastery", desc: "Perfect sun salutation A & B variations, flow smoothly 20 times" },
            { id: 5, title: "Standing poses series", desc: "Warrior I, II, III, triangle, extended side angle - build balance and strength" },
            { id: 6, title: "Arm balances intro", desc: "crow pose, side crow, handstand preparation exercises" },
            { id: 7, title: "Advanced inversions", desc: "Headstand, shoulder stand, scorpion pose, handstand" },
            { id: 8, title: "Meditation practice", desc: "20+ minute daily meditation, mindfulness integration" },
          ],
        },
        "cycling": {
          title: "Cycling",
          desc: "Path to becoming a strong, efficient cyclist",
          icon: "🚴",
          tasks: [
            { id: 1, title: "Get fitted to your bike", desc: "Professional bike fitting for comfort and efficiency" },
            { id: 2, title: "Build basic endurance", desc: "Ride 2-3 hours comfortably at conversational pace" },
            { id: 3, title: "Learn cadence and gearing", desc: "Master RPM control (90-100) and proper gear selection" },
            { id: 4, title: "Add hill training", desc: "Include weekly hill repeats and long climbs" },
            { id: 5, title: "Speed work intervals", desc: "VO2 max efforts, threshold intervals, sprint work" },
            { id: 6, title: "Long ride building", desc: "Progress to 4-5 hour rides with proper nutrition" },
            { id: 7, title: "Century ride (100 miles)", desc: "Complete a 100-mile century ride" },
          ],
        },
        "nutrition": {
          title: "Nutrition Coaching",
          desc: "Master nutrition science and meal planning",
          icon: "🥗",
          tasks: [
            { id: 1, title: "Learn macronutrient basics", desc: "Understand proteins, carbs, fats and their roles" },
            { id: 2, title: "Calculate personal calorie needs", desc: "Determine TDEE and calorie targets for your goals" },
            { id: 3, title: "Build balanced meal plans", desc: "Create 7-day meal plans with proper macro ratios" },
            { id: 4, title: "Master meal prep", desc: "Prepare and store meals for the entire week efficiently" },
            { id: 5, title: "Pre/post-workout nutrition", desc: "Time nutrients correctly around training sessions" },
            { id: 6, title: "Supplement education", desc: "Learn which supplements are evidence-based and effective" },
            { id: 7, title: "Advanced periodized nutrition", desc: "Adjust nutrition based on training phase and goals" },
          ],
        },
      };

      function TaskItem({ task, completed, onToggle }) {
        const handleClick = () => {
          if (!completed) {
            // Trigger confetti
            if (window.confetti) {
              confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
              });
            }
          }
          onToggle(task.id);
        };

        return (
          <div className={`task ${completed ? 'completed' : ''}`}>
            <div
              className="task-checkbox"
              onClick={handleClick}
            >
              {completed && '✓'}
            </div>
            <div className="task-content">
              <h3>{task.title}</h3>
              <p>{task.desc}</p>
            </div>
          </div>
        );
      }

      function App() {
        const [pathId, setPathId] = useState(() => {
          const params = new URLSearchParams(window.location.search);
          return params.get('id') || 'strength-training';
        });

        const pathInfo = PATH_DATA[pathId];
        const [completed, setCompleted] = useState(() => {
          const saved = localStorage.getItem(`path_${pathId}_completed`);
          return saved ? JSON.parse(saved) : [];
        });
        const [showEncouragement, setShowEncouragement] = useState(false);
        const [encouragementMsg, setEncouragementMsg] = useState("");

        const encouragementMessages = [
          "🎉 Great work! Keep it up!",
          "💪 You're crushing it!",
          "🔥 Awesome progress!",
          "⭐ Fantastic effort!",
          "🚀 You got this!",
          "💥 Incredible dedication!",
          "🏆 Champion mindset!",
          "✨ Phenomenal work!",
        ];

        useEffect(() => {
          localStorage.setItem(`path_${pathId}_completed`, JSON.stringify(completed));
        }, [completed, pathId]);

        const handleToggleTask = (taskId) => {
          setCompleted(prev => {
            const isCompleted = prev.includes(taskId);
            if (!isCompleted) {
              const msg = encouragementMessages[Math.floor(Math.random() * encouragementMessages.length)];
              setEncouragementMsg(msg);
              setShowEncouragement(true);
              setTimeout(() => setShowEncouragement(false), 3000);
            }
            return isCompleted
              ? prev.filter(id => id !== taskId)
              : [...prev, taskId];
          });
        };

        if (!pathInfo) {
          return <main><p>Path not found</p></main>;
        }

        const completionRate = Math.round((completed.length / pathInfo.tasks.length) * 100);

        return (
          <>
            <main>
              <div className="header">
                <h1>{pathInfo.icon} {pathInfo.title}</h1>
                <p>{pathInfo.desc}</p>
              </div>

              <div className="progress-section">
                <div className="progress-bar">
                  <div className="progress-fill" style={{ width: `${completionRate}%` }}></div>
                </div>
                <div className="progress-text">
                  Progress: {completed.length} / {pathInfo.tasks.length} tasks completed ({completionRate}%)
                </div>
              </div>

              <div className="tasks">
                {pathInfo.tasks.map(task => (
                  <TaskItem
                    key={task.id}
                    task={task}
                    completed={completed.includes(task.id)}
                    onToggle={handleToggleTask}
                  />
                ))}
              </div>
            </main>

            {showEncouragement && (
              <div className="encouragement-toast">
                <h3>Task Complete! 🎊</h3>
                <p>{encouragementMsg}</p>
              </div>
            )}
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
