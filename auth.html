<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <title>Login — FitPath</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #1a1714;
        --bg2: #211c18;
        --bg3: #2a2420;
        --bg4: #302a25;
        --border: #3d3028;
        --border2: #4a3a2e;
        --text: #d4ccc4;
        --text2: #8a7f76;
        --text-head: #ede8e2;
        --accent: #cf7b4b;
        --accent2: #8a5230;
        --font: "Lora", Georgia, serif;
        --mono: "Geist Mono", monospace;
      }
      html {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--bg4);
        border-radius: 3px;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;

      function Input({
        label,
        type = "text",
        placeholder,
        value,
        onChange,
        error,
      }) {
        const [focused, setFocused] = useState(false);
        return (
          <div style={{ marginBottom: 18 }}>
            <label
              style={{
                display: "block",
                fontSize: 13,
                color: "var(--text2)",
                marginBottom: 6,
                fontWeight: 500,
              }}
            >
              {label}
            </label>
            <input
              type={type}
              placeholder={placeholder}
              value={value}
              onChange={onChange}
              onFocus={() => setFocused(true)}
              onBlur={() => setFocused(false)}
              style={{
                width: "100%",
                background: "var(--bg3)",
                border: `1px solid ${focused ? "var(--accent)" : error ? "#c0392b" : "var(--border)"}`,
                borderRadius: 9,
                padding: "11px 14px",
                color: "var(--text-head)",
                fontSize: 14.5,
                fontFamily: "var(--font)",
                outline: "none",
                transition: "border-color .15s",
              }}
            />
            {error && (
              <div style={{ fontSize: 12, color: "#e07070", marginTop: 4 }}>
                {error}
              </div>
            )}
          </div>
        );
      }

      function Divider() {
        return (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: 12,
              margin: "20px 0",
            }}
          >
            <div style={{ flex: 1, height: 1, background: "var(--border)" }} />
            <span style={{ fontSize: 12, color: "var(--text2)" }}>
              or continue with
            </span>
            <div style={{ flex: 1, height: 1, background: "var(--border)" }} />
          </div>
        );
      }

      function SocialBtn({ icon, label }) {
        const [hov, setHov] = useState(false);
        return (
          <button
            onMouseEnter={() => setHov(true)}
            onMouseLeave={() => setHov(false)}
            style={{
              flex: 1,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              gap: 8,
              background: hov ? "var(--bg3)" : "var(--bg2)",
              border: "1px solid var(--border)",
              borderRadius: 9,
              padding: "10px 0",
              color: "var(--text)",
              fontSize: 13.5,
              fontWeight: 500,
              cursor: "pointer",
              fontFamily: "var(--font)",
              transition: "all .15s",
            }}
          >
            <span style={{ fontSize: 16 }}>{icon}</span>
            {label}
          </button>
        );
      }

      function AuthPage() {
        const [mode, setMode] = useState(() => {
          const p = new URLSearchParams(window.location.search);
          return p.get("mode") === "signup" ? "signup" : "login";
        });
        const [form, setForm] = useState({
          email: "",
          password: "",
          name: "",
          confirm: "",
        });
        const [errors, setErrors] = useState({});
        const [submitted, setSubmitted] = useState(false);

        const set = (k) => (e) =>
          setForm((f) => ({ ...f, [k]: e.target.value }));

        const validate = () => {
          const e = {};
          if (!form.email.includes("@")) e.email = "Enter a valid email";
          if (form.password.length < 8) e.password = "At least 8 characters";
          if (mode === "signup") {
            if (!form.name.trim()) e.name = "Name is required";
            if (form.confirm !== form.password)
              e.confirm = "Passwords don't match";
          }
          return e;
        };

        const submit = (ev) => {
          ev.preventDefault();
          const e = validate();
          setErrors(e);
          if (Object.keys(e).length === 0) setSubmitted(true);
        };

        if (submitted) {
          return (
            <div
              style={{
                minHeight: "100vh",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                padding: 24,
              }}
            >
              <div
                style={{ textAlign: "center", animation: "fadeInUp .3s ease" }}
              >
                <div style={{ fontSize: 48, marginBottom: 16 }}>✓</div>
                <h2
                  style={{
                    fontSize: 24,
                    fontWeight: 700,
                    color: "var(--text-head)",
                    marginBottom: 8,
                  }}
                >
                  {mode === "login" ? "Welcome back!" : "Account created!"}
                </h2>
                <p style={{ color: "var(--text2)", marginBottom: 24 }}>
                  {mode === "login"
                    ? "You are now signed in."
                    : "Your account is ready to go."}
                </p>
                <a
                  href="path.html"
                  style={{
                    display: "inline-block",
                    background: "var(--accent)",
                    color: "#1A1714",
                    padding: "10px 28px",
                    borderRadius: 9,
                    fontWeight: 700,
                    fontSize: 14,
                  }}
                >
                  Go to Roadmaps →
                </a>
              </div>
            </div>
          );
        }

        return (
          <div
            style={{
              minHeight: "100vh",
              display: "grid",
              gridTemplateColumns: "1fr 1fr",
            }}
          >
            {/* Left panel — decorative */}
            <div
              style={{
                background: "var(--bg2)",
                borderRight: "1px solid var(--border)",
                display: "flex",
                flexDirection: "column",
                padding: 48,
                position: "relative",
                overflow: "hidden",
              }}
            >
              {/* Ambient glow */}
              <div
                style={{
                  position: "absolute",
                  top: -120,
                  left: -120,
                  width: 400,
                  height: 400,
                  borderRadius: "50%",
                  background:
                    "radial-gradient(circle, rgba(207,123,75,0.12) 0%, transparent 70%)",
                  pointerEvents: "none",
                }}
              />

              <a
                href="path.html"
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                  marginBottom: "auto",
                  textDecoration: "none",
                }}
              >
                <div
                  style={{
                    width: 32,
                    height: 32,
                    background: "var(--accent)",
                    borderRadius: 8,
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    fontSize: 15,
                    fontWeight: 800,
                    color: "#1A1714",
                  }}
                >
                  R
                </div>
                <span
                  style={{
                    fontWeight: 700,
                    fontSize: 17,
                    color: "var(--text-head)",
                  }}
                >
                  FitPath
                </span>
              </a>

              <div style={{ marginBottom: "auto", paddingTop: 80 }}>
                <h2
                  style={{
                    fontSize: 32,
                    fontWeight: 700,
                    color: "var(--text-head)",
                    lineHeight: 1.25,
                    marginBottom: 16,
                  }}
                >
                  Your learning path,
                  <br />
                  <em style={{ color: "var(--accent)", fontStyle: "italic" }}>
                    mapped out.
                  </em>
                </h2>
                <p
                  style={{
                    color: "var(--text2)",
                    fontSize: 15,
                    lineHeight: 1.75,
                    maxWidth: 340,
                  }}
                >
                  Join thousands of athletes using FitPath to train smarter with structured, community-driven fitness paths.
                </p>

                <div
                  style={{
                    marginTop: 40,
                    display: "flex",
                    flexDirection: "column",
                    gap: 14,
                  }}
                >
                  {[
                    { icon: "◈", text: "24+ curated training paths" },
                    { icon: "◉", text: "Track your progress across workouts" },
                    { icon: "◆", text: "Community-driven path updates" },
                  ].map((f) => (
                    <div
                      key={f.text}
                      style={{ display: "flex", alignItems: "center", gap: 12 }}
                    >
                      <span style={{ color: "var(--accent)", fontSize: 16 }}>
                        {f.icon}
                      </span>
                      <span style={{ fontSize: 13.5, color: "var(--text2)" }}>
                        {f.text}
                      </span>
                    </div>
                  ))}
                </div>
              </div>

              <p style={{ fontSize: 12, color: "var(--text2)", marginTop: 40 }}>
                © 2024 FitPath
              </p>
            </div>

            {/* Right panel — form */}
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                padding: 48,
              }}
            >
              <div
                style={{
                  width: "100%",
                  maxWidth: 380,
                  animation: "fadeInUp .3s ease",
                }}
              >
                <h1
                  style={{
                    fontSize: 26,
                    fontWeight: 700,
                    color: "var(--text-head)",
                    marginBottom: 6,
                  }}
                >
                  {mode === "login"
                    ? "Sign in to your account"
                    : "Create your account"}
                </h1>
                <p
                  style={{
                    fontSize: 13.5,
                    color: "var(--text2)",
                    marginBottom: 28,
                  }}
                >
                  {mode === "login" ? (
                    <>
                      No account?{" "}
                      <button
                        onClick={() => setMode("signup")}
                        style={{
                          background: "none",
                          border: "none",
                          color: "var(--accent)",
                          cursor: "pointer",
                          fontFamily: "var(--font)",
                          fontSize: 13.5,
                          padding: 0,
                        }}
                      >
                        Sign up for free
                      </button>
                    </>
                  ) : (
                    <>
                      Already have one?{" "}
                      <button
                        onClick={() => setMode("login")}
                        style={{
                          background: "none",
                          border: "none",
                          color: "var(--accent)",
                          cursor: "pointer",
                          fontFamily: "var(--font)",
                          fontSize: 13.5,
                          padding: 0,
                        }}
                      >
                        Sign in
                      </button>
                    </>
                  )}
                </p>

                {/* Social */}
                <div style={{ display: "flex", gap: 10, marginBottom: 4 }}>
                  <SocialBtn icon="⬡" label="GitHub" />
                  <SocialBtn icon="◉" label="Google" />
                </div>

                <Divider />

                <form onSubmit={submit}>
                  {mode === "signup" && (
                    <Input
                      label="Full name"
                      placeholder="Jane Doe"
                      value={form.name}
                      onChange={set("name")}
                      error={errors.name}
                    />
                  )}
                  <Input
                    label="Email address"
                    type="email"
                    placeholder="you@example.com"
                    value={form.email}
                    onChange={set("email")}
                    error={errors.email}
                  />
                  <Input
                    label="Password"
                    type="password"
                    placeholder="••••••••"
                    value={form.password}
                    onChange={set("password")}
                    error={errors.password}
                  />
                  {mode === "signup" && (
                    <Input
                      label="Confirm password"
                      type="password"
                      placeholder="••••••••"
                      value={form.confirm}
                      onChange={set("confirm")}
                      error={errors.confirm}
                    />
                  )}

                  {mode === "login" && (
                    <div
                      style={{
                        textAlign: "right",
                        marginTop: -10,
                        marginBottom: 18,
                      }}
                    >
                      <a
                        href="forgot-password.html"
                        style={{ fontSize: 12.5, color: "var(--text2)" }}
                        onMouseEnter={(e) =>
                          (e.target.style.color = "var(--accent)")
                        }
                        onMouseLeave={(e) =>
                          (e.target.style.color = "var(--text2)")
                        }
                      >
                        Forgot password?
                      </a>
                    </div>
                  )}

                  <button
                    type="submit"
                    style={{
                      width: "100%",
                      background: "var(--accent)",
                      color: "#1A1714",
                      border: "none",
                      borderRadius: 9,
                      padding: "12px",
                      fontSize: 15,
                      fontWeight: 700,
                      fontFamily: "var(--font)",
                      cursor: "pointer",
                      transition: "background .15s",
                      marginTop: 4,
                    }}
                    onMouseEnter={(e) =>
                      (e.currentTarget.style.background = "#d98a5e")
                    }
                    onMouseLeave={(e) =>
                      (e.currentTarget.style.background = "var(--accent)")
                    }
                  >
                    {mode === "login" ? "Sign in" : "Create account"}
                  </button>

                  {mode === "signup" && (
                    <p
                      style={{
                        fontSize: 11.5,
                        color: "var(--text2)",
                        textAlign: "center",
                        marginTop: 14,
                        lineHeight: 1.6,
                      }}
                    >
                      By creating an account you agree to our{" "}
                      <a href="terms.html" style={{ color: "var(--accent)" }}>
                        Terms of Service
                      </a>{" "}
                      and{" "}
                      <a href="privacy.html" style={{ color: "var(--accent)" }}>
                        Privacy Policy
                      </a>
                      .
                    </p>
                  )}
                </form>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<AuthPage />);
    </script>
  </body>
</html>
