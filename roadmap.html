      function SearchModal({ open, onClose }) {
        const [q, setQ] = useState("");
        const inputRef = useRef(null);
        const allRoadmaps = [...ROADMAPS.role, ...ROADMAPS.skill];
        const results = q.trim()
          ? allRoadmaps.filter(
              (r) =>
                r.title.toLowerCase().includes(q.toLowerCase()) ||
                r.desc.toLowerCase().includes(q.toLowerCase()),
            )
          : allRoadmaps.slice(0, 6);

        useEffect(() => {
          if (open) {
            setQ("");
            setTimeout(() => inputRef.current?.focus(), 50);
          }
        }, [open]);

        useEffect(() => {
          const handler = (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === "k") {
              e.preventDefault();
            }
            if (e.key === "Escape") onClose();
          };
          window.addEventListener("keydown", handler);
          return () => window.removeEventListener("keydown", handler);
        }, [onClose]);

        if (!open) return null;
        return (
          <div
            onClick={onClose}
            style={{
              position: "fixed",
              inset: 0,
              zIndex: 200,
              background: "rgba(0,0,0,0.7)",
              backdropFilter: "blur(4px)",
              display: "flex",
              alignItems: "flex-start",
              justifyContent: "center",
              paddingTop: 80,
            }}
          >
            <div
              onClick={(e) => e.stopPropagation()}
              style={{
                width: "100%",
                maxWidth: 560,
                background: "var(--bg2)",
                border: "1px solid var(--border2)",
                borderRadius: 14,
                overflow: "hidden",
                boxShadow: "0 24px 60px rgba(0,0,0,0.5)",
                animation: "fadeInUp .18s ease",
              }}
            >
              <div
                style={{

                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                }}
              >
                <span style={{ fontSize: 18, color: "var(--text2)" }}>⌕</span>
                <input
                  ref={inputRef}
                  value={q}
                  onChange={(e) => setQ(e.target.value)}
                  placeholder="Search roadmaps, guides..."
                  style={{
                    flex: 1,
                    background: "none",
                    border: "none",
                    outline: "none",
                    color: "var(--text)",
                    fontSize: 16,
                    fontFamily: "var(--font)",
                  }}

                <kbd
                  style={{
                    fontFamily: "var(--mono)",
                    fontSize: 12,
                    color: "var(--text2)",
                    background: "var(--bg3)",
                    padding: "2px 8px",
                    borderRadius: 5,
                  }}
                >
                  ESC
                </kbd>
              </div>
              <div style={{ maxHeight: 400, overflowY: "auto" }}>
                {results.length === 0 && (
                  <div
                    style={{
                      padding: 32,
                      textAlign: "center",
                      color: "var(--text2)",
                      fontSize: 14,
                    }}

                    No results found
                  </div>
                )}
                {results.map((r, i) => (
                  <a
                    key={r.id}
                    href={`roadmap-detail.html?id=${r.id}`}
                    onClick={onClose}
                    style={{
                      display: "flex",
                      alignItems: "center",

                />
              </div>
              <button
                type="submit"
                style={{
                  background: "var(--accent)",
                  color: "#0f1117",
                  fontWeight: 600,
                  fontSize: 14,
                  padding: "0 20px",
                  border: "none",
                  borderRadius: 10,
                  transition: "background .15s",
                }}
                onMouseEnter={(e) =>
                  (e.currentTarget.style.background = "#d98a5e")
                }
                onMouseLeave={(e) =>
                  (e.currentTarget.style.background = "var(--accent)")
                }
              >
                Search
              </button>
            </form>

            {/* Stats */}
            <div
              style={{
                display: "flex",
                justifyContent: "center",
                gap: 40,
                flexWrap: "wrap",
              }}
            >
              {STATS.map((s) => (
                <div key={s.label} style={{ textAlign: "center" }}>
                  <div
                    style={{
                      fontSize: 26,
                      fontWeight: 800,
                      color: s.color,
                      letterSpacing: "-1px",
                    }}
                  >
                    {s.value}
                  </div>
                  <div
                    style={{
                      fontSize: 12,
                      color: "var(--text2)",
                      marginTop: 2,
                    }}
                  >
                    {s.label}
                  </div>
                </div>
              ))}
            </div>
          </section>
        );
      }

      // Bento span patterns — 3 items per visual row, always sum to 4 cols
      // [colSpan, rowSpan]
      const BENTO_PATTERNS = [
        [2, 1],
        [1, 1],
        [1, 1], // row A: wide | normal | normal
        [1, 1],
        [2, 1],
        [1, 1], // row B: normal | wide | normal
        [1, 1],
        [1, 1],
        [2, 1], // row C: normal | normal | wide
        [2, 1],
        [1, 1],
        [1, 1], // row D: wide | normal | normal
      ];

      function RoadmapCard({ item, colSpan = 1, rowSpan = 1 }) {
        const [hovered, setHovered] = useState(false);
        const isWide = colSpan >= 2 && rowSpan === 1; // horizontal card
        const isTall = rowSpan >= 2 && colSpan === 1; // tall card
        const isFeatured = colSpan >= 2 && rowSpan >= 2; // big card

        const iconSize = isFeatured ? 52 : isWide ? 44 : 40;
        const fontSize = isFeatured ? 26 : isWide ? 22 : 14;
        const pad = isFeatured || isTall ? 24 : isWide ? 20 : 18;

        return (
          <a
            href={item.href || "#"}
            style={{
              gridColumn: `span ${colSpan}`,
              gridRow: `span ${rowSpan}`,
              display: "flex",
              flexDirection: isWide ? "row" : "column",
              alignItems: isWide ? "center" : "flex-start",
              justifyContent: "flex-start",
              gap: isWide ? 20 : 0,
              padding: pad,
              background: hovered
                ? `linear-gradient(135deg, ${item.color}12 0%, var(--bg3) 100%)`
                : "var(--bg2)",
              border: `1px solid ${hovered ? item.color + "55" : "var(--border)"}`,
              borderRadius: 14,
              transition: "all .22s",
              boxShadow: hovered ? `0 4px 32px ${item.color}18` : "none",
              position: "relative",
              overflow: "hidden",
            }}
            onMouseEnter={() => setHovered(true)}
            onMouseLeave={() => setHovered(false)}
          >
            {/* Watermark */}
            <span
              style={{
                position: "absolute",
                right: 12,
                bottom: 8,
                fontSize: isFeatured ? 88 : isWide ? 64 : 52,
                color: item.color,
                opacity: hovered ? 0.1 : 0.06,
                lineHeight: 1,
                userSelect: "none",
                transition: "opacity .22s",
                pointerEvents: "none",
              }}
            >
              {item.icon}
            </span>

            {/* Icon badge */}
            <span
              style={{
                flexShrink: 0,
                width: iconSize,
                height: iconSize,
                background: `${item.color}18`,
                borderRadius: 11,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                fontSize: isFeatured ? 28 : isWide ? 22 : 20,
                color: item.color,
                marginBottom: isWide ? 0 : isTall || isFeatured ? 16 : 12,
              }}
            >
              {item.icon}
            </span>

            {/* Content */}
            <div
              style={{
                flex: 1,
                minWidth: 0,
                display: "flex",
                flexDirection: "column",
              }}
            >
              {/* Title + badge row */}
              <div
                style={{
                  display: "flex",
                  alignItems: "flex-start",
                  justifyContent: "space-between",
                  gap: 8,
                  marginBottom: 8,
                }}
              >
                <div
                  style={{
                    fontWeight: 700,
                    fontSize: isFeatured ? 20 : isWide ? 16 : 14.5,
                    color: "var(--text-head)",
                    lineHeight: 1.3,
                  }}
                >
                  {item.title}
                </div>
                {item.popular && (
                  <span
                    style={{
                      flexShrink: 0,
                      fontSize: 10,
                      background: `${item.color}18`,
                      color: item.color,
                      padding: "3px 8px",
                      borderRadius: 20,
                      fontWeight: 600,
                      border: `1px solid ${item.color}33`,
                    }}
                  >
                    ★ Popular
                  </span>
                )}
              </div>

              {/* Description — shown on wide, tall and featured */}
              {(isWide || isTall || isFeatured) && (
                <div
                  style={{
                    fontSize: 12.5,
                    color: "var(--text2)",
                    lineHeight: 1.65,
                    display: "-webkit-box",
                    WebkitLineClamp: isWide ? 2 : 3,
                    WebkitBoxOrient: "vertical",
                    overflow: "hidden",
                  }}
                >
                  {item.desc}
                </div>
              )}

              {/* Hover CTA */}
              {!isWide && (
                <div
                  style={{
                    marginTop: "auto",
                    paddingTop: 10,
                    fontSize: 12,
                    color: item.color,
                    fontWeight: 500,
                    opacity: hovered ? 1 : 0,
                    transition: "opacity .18s",
                  }}
                >
                  View Roadmap →
                </div>
              )}
            </div>
          </a>
        );
      }

      function Section({ title, items, filterQuery }) {
        const filtered = filterQuery
          ? items.filter(
              (r) =>
                r.title.toLowerCase().includes(filterQuery.toLowerCase()) ||
                r.desc.toLowerCase().includes(filterQuery.toLowerCase()),
            )
          : items;
        if (filtered.length === 0) return null;

        // Best Practices gets a fixed tight 4-card layout: big left + 2 stacked right top + 1 wide bottom right
        const isBestPractices = filtered.length <= 4;
        if (isBestPractices && !filterQuery) {
          const patterns = [
            [1, 2],
            [1, 1],
            [1, 1],
            [2, 1],
          ]; // 3-col grid
          return (
            <section style={{ marginBottom: 56 }}>
              <h2
                style={{
                  fontSize: 19,
                  fontWeight: 700,
                  marginBottom: 18,
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                  color: "var(--text-head)",
                }}
              >
                {title}
                <span
                  style={{
                    fontSize: 11.5,
                    background: "var(--bg2)",
                    border: "1px solid var(--border)",
                    color: "var(--text2)",
                    padding: "2px 8px",
                    borderRadius: 20,
                  }}
                >
                  {filtered.length}
                </span>
              </h2>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(3, 1fr)",
                  gridAutoRows: "150px",
                  gap: 12,
                }}
              >
                {filtered.map((item, i) => {
                  const [cs, rs] = patterns[i] || [1, 1];
                  return (
                    <RoadmapCard
                      key={item.id}
                      item={item}
                      colSpan={cs}
                      rowSpan={rs}
                    />
                  );
                })}
              </div>
            </section>
          );
        }

        return (
          <section style={{ marginBottom: 56 }}>
            <h2
              style={{
                fontSize: 19,
                fontWeight: 700,
                marginBottom: 18,
                display: "flex",
                alignItems: "center",
                gap: 10,
                color: "var(--text-head)",
              }}
            >
              {title}
              <span
                style={{
                  fontSize: 11.5,
                  background: "var(--bg2)",
                  border: "1px solid var(--border)",
                  color: "var(--text2)",
                  padding: "2px 8px",
                  borderRadius: 20,
                }}
              >
                {filtered.length}
              </span>
            </h2>
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(4, 1fr)",
                gridAutoRows: "150px",
                gap: 12,
              }}
            >
              {filtered.map((item, i) => {
                const [cs, rs] = BENTO_PATTERNS[i % BENTO_PATTERNS.length];
                const safeCs = Math.min(cs, 4);
                return (
                  <RoadmapCard
                    key={item.id}
                    item={item}
                    colSpan={safeCs}
                    rowSpan={rs}
                  />
                );
              })}
            </div>
          </section>
        );
      }

      function Banner() {
        return (
          <div
            style={{
              background:
                "linear-gradient(135deg, rgba(207,123,75,0.08) 0%, rgba(138,82,48,0.08) 100%)",
              border: "1px solid var(--border2)",
              borderRadius: 14,
              padding: "28px 32px",
              marginBottom: 48,
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              gap: 20,
              flexWrap: "wrap",
            }}
          >
            <div>
              <div style={{ fontSize: 19, fontWeight: 700, marginBottom: 6 }}>
                Create your own roadmap
              </div>
              <div
                style={{ fontSize: 13.5, color: "var(--text2)", maxWidth: 400 }}
              >
                Build custom learning paths for yourself or your team. Share
                them publicly or keep them private.
              </div>
            </div>
            <button
              style={{
                background: "var(--accent)",
                color: "#0f1117",
                fontWeight: 700,
                fontSize: 14,
                padding: "10px 22px",
                border: "none",
                borderRadius: 9,
                flexShrink: 0,
                transition: "background .15s",
                cursor: "pointer",
              }}
              onMouseEnter={(e) =>
                (e.currentTarget.style.background = "#d98a5e")
              }
              onMouseLeave={(e) =>
                (e.currentTarget.style.background = "var(--accent)")
              }
              onClick={() => (window.location.href = "create-roadmap.html")}
            >
              Create Roadmap →
            </button>
          </div>
        );
      }

      function Footer() {
        const links = [
          ["About", "Changelog", "YouTube", "Discord"],
          ["Roadmaps", "Best Practices", "Guides", "Videos"],
          ["GitHub", "Twitter", "LinkedIn", "RSS"],
        ];
        return (
          <footer
            style={{
              borderTop: "1px solid var(--border)",
              marginTop: 60,
              padding: "40px 24px",
            }}
          >
            <div style={{ maxWidth: 1200, margin: "0 auto" }}>
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  flexWrap: "wrap",
                  gap: 32,
                  marginBottom: 32,
                }}
              >
                <div>
                  <div
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 10,
                      marginBottom: 12,
                    }}
                  >
                    <div
                      style={{
                        width: 28,
                        height: 28,
                        background: "var(--accent)",
                        borderRadius: 7,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        fontSize: 14,
                        fontWeight: 800,
                        color: "#0f1117",
                      }}
                    >
                      R
                    </div>
                    <span style={{ fontWeight: 700, fontSize: 16 }}>
                      FitPath.dev
                    </span>
                  </div>
                  <p
                    style={{
                      fontSize: 13,
                      color: "var(--text2)",
                      maxWidth: 260,
                      lineHeight: 1.6,
                    }}
                  >
                    Community-driven developer roadmaps, articles and resources
                    to help you grow in your career.
                  </p>
                </div>
                {links.map((group, i) => {
                  const linkMap = {
                    About: "about.html",
                    Changelog: "changelog.html",
                    YouTube: "https://youtube.com",
                    Discord: "https://discord.com",
                    Roadmaps: "roadmap.html",
                    "Best Practices": "best-practices.html",
                    Guides: "guides.html",
                    Videos: "videos.html",
                    GitHub: "https://github.com",
                    Twitter: "https://twitter.com",
                    LinkedIn: "https://linkedin.com",
                    RSS: "#",
                  };
                  return (
                    <div
                      key={i}
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: 8,
                      }}
                    >
                      {group.map((l) => (
                        <a
                          key={l}
                          href={linkMap[l] || "#"}
                          target={
                            linkMap[l]?.startsWith("http")
                              ? "_blank"
                              : undefined
                          }
                          rel={
                            linkMap[l]?.startsWith("http")
                              ? "noopener noreferrer"
                              : undefined
                          }
                          style={{
                            fontSize: 13.5,
                            color: "var(--text2)",
                            transition: "color .12s",
                          }}
                          onMouseEnter={(e) =>
                            (e.target.style.color = "var(--text)")
                          }
                          onMouseLeave={(e) =>
                            (e.target.style.color = "var(--text2)")
                          }
                        >
                          {l}
                        </a>
                      ))}
                    </div>
                  );
                })}
              </div>
              <div
                style={{
                  borderTop: "1px solid var(--border)",
                  paddingTop: 20,
                  display: "flex",
                  justifyContent: "space-between",
                  flexWrap: "wrap",
                  gap: 10,
                }}
              >
                <span style={{ fontSize: 12.5, color: "var(--text2)" }}>
                  © 2024 FitPath.dev — All rights reserved
                </span>
                <span style={{ fontSize: 12.5, color: "var(--text2)" }}>
                  Made with ♥ by the community
                </span>
              </div>
            </div>
          </footer>
        );
      }

      /* Tweaks Panel */
      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/ {
        accentColor: "#CF7B4B",
        viewMode: "list",
        showPopularBadges: true,
        darkBg: "#1A1714",
      }; /*EDITMODE-END*/

      function TweaksPanel({ visible, tweaks, onChange }) {
        if (!visible) return null;
        return (
          <div
            style={{
              position: "fixed",
              bottom: 24,
              right: 24,
              zIndex: 300,
              background: "var(--bg2)",
              border: "1px solid var(--border2)",
              borderRadius: 14,
              padding: 20,
              width: 240,
              boxShadow: "0 8px 32px rgba(0,0,0,0.4)",
              animation: "fadeInUp .2s ease",
            }}
          >
            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 16 }}>
              Tweaks
            </div>

            <div style={{ marginBottom: 12 }}>
              <label
                style={{
                  fontSize: 12,
                  color: "var(--text2)",
                  display: "block",
                  marginBottom: 4,
                }}
              >
                Accent Color
              </label>
              <div style={{ display: "flex", gap: 8 }}>
                {["#CF7B4B", "#8A5230", "#9DC499", "#D4CCC4", "#8A7F76"].map(
                  (c) => (
                    <button
                      key={c}
                      onClick={() => onChange("accentColor", c)}
                      style={{
                        width: 24,
                        height: 24,
                        borderRadius: "50%",
                        background: c,
                        border: "none",
                        outline:
                          tweaks.accentColor === c ? `2px solid white` : "none",
                        outlineOffset: 2,
                        cursor: "pointer",
                      }}
                    />
                  ),
                )}
              </div>
            </div>

            <div>
              <label
                style={{
                  fontSize: 12,
                  color: "var(--text2)",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  cursor: "pointer",
                }}
              >
                Popular badges
                <div
                  onClick={() =>
                    onChange("showPopularBadges", !tweaks.showPopularBadges)
                  }
                  style={{
                    width: 36,
                    height: 20,
                    borderRadius: 10,
                    background: tweaks.showPopularBadges
                      ? "var(--accent)"
                      : "var(--border2)",
                    position: "relative",
                    transition: "background .2s",
                    cursor: "pointer",
                  }}
                >
                  <div
                    style={{
                      width: 14,
                      height: 14,
                      borderRadius: "50%",
                      background: "white",
                      position: "absolute",
                      top: 3,
                      left: tweaks.showPopularBadges ? 18 : 3,
                      transition: "left .2s",
                    }}
                  />
                </div>
              </label>
            </div>
          </div>
        );
      }

      /* ── APP ─────────────────────────────────────────────────── */
      function useCustomRoadmaps() {
        const [custom, setCustom] = useState(() =>
          JSON.parse(localStorage.getItem("custom_roadmaps") || "[]"),
        );
        useEffect(() => {
          const onStorage = () =>
            setCustom(
              JSON.parse(localStorage.getItem("custom_roadmaps") || "[]"),
            );
          window.addEventListener("storage", onStorage);
          // also poll on focus so same-tab changes reflect
          const onFocus = () =>
            setCustom(
              JSON.parse(localStorage.getItem("custom_roadmaps") || "[]"),
            );
          window.addEventListener("focus", onFocus);
          return () => {
            window.removeEventListener("storage", onStorage);
            window.removeEventListener("focus", onFocus);
          };
        }, []);
        return custom;
      }

      function App() {
        const [searchOpen, setSearchOpen] = useState(false);
        const [filterQuery, setFilterQuery] = useState("");
        const customRoadmaps = useCustomRoadmaps();
        const [tweaks, setTweaks] = useState(() => {
          const saved = localStorage.getItem("roadmap_tweaks");
          return saved
            ? { ...TWEAK_DEFAULTS, ...JSON.parse(saved) }
            : TWEAK_DEFAULTS;
        });
        const [tweaksVisible, setTweaksVisible] = useState(false);

        // Apply accent color
        useEffect(() => {
          document.documentElement.style.setProperty(
            "--accent",
            tweaks.accentColor,
          );
          document.documentElement.style.setProperty("--bg", tweaks.darkBg);
          localStorage.setItem("roadmap_tweaks", JSON.stringify(tweaks));
        }, [tweaks]);

        const handleTweak = (key, val) => {
          const next = { ...tweaks, [key]: val };
          setTweaks(next);
          window.parent.postMessage(
            { type: "__edit_mode_set_keys", edits: { [key]: val } },
            "*",
          );
        };

        // Tweaks host communication
        useEffect(() => {
          const handler = (e) => {
            if (e.data?.type === "__activate_edit_mode") setTweaksVisible(true);
            if (e.data?.type === "__deactivate_edit_mode")
              setTweaksVisible(false);
          };
          window.addEventListener("message", handler);
          window.parent.postMessage({ type: "__edit_mode_available" }, "*");
          return () => window.removeEventListener("message", handler);
        }, []);

        const viewMode = tweaks.viewMode;

        return (
          <>
            <NavBar
              searchOpen={searchOpen}
              setSearchOpen={setSearchOpen}
              query={filterQuery}
              setQuery={setFilterQuery}
            />
            <SearchModal
              open={searchOpen}
              onClose={() => setSearchOpen(false)}
            />

            <main
              style={{
                maxWidth: 1200,
                margin: "0 auto",
                padding: "0 24px 40px",
              }}
            >
              <Hero onSearch={(q) => setFilterQuery(q)} />

              {filterQuery && (
                <div
                  style={{
                    marginBottom: 24,
                    display: "flex",
                    alignItems: "center",
                    gap: 10,
                  }}
                >
                  <span style={{ fontSize: 14, color: "var(--text2)" }}>
                    Results for:
                  </span>
                  <span
                    style={{
                      fontSize: 14,
                      fontWeight: 600,
                      color: "var(--accent)",
                    }}
                  >
                    "{filterQuery}"
                  </span>
                  <button
                    onClick={() => setFilterQuery("")}
                    style={{
                      background: "none",
                      border: "1px solid var(--border)",
                      borderRadius: 6,
                      color: "var(--text2)",
                      fontSize: 12,
                      padding: "2px 8px",
                      cursor: "pointer",
                    }}
                  >
                    ✕ Clear
                  </button>
                </div>
              )}

              {!filterQuery && <Banner />}

              {(() => {
                // Merge custom roadmaps into base sections + any new custom categories
                const merged = {
                  "Role-based Roadmaps": [...ROADMAPS.role],
                  "Skill-based Roadmaps": [...ROADMAPS.skill],
                  "Best Practices": [...ROADMAPS.bestpractices],
                };
                const customCats = {};
                customRoadmaps.forEach((r) => {
                  const cat = r.category || "My Roadmaps";
                  const card = {
                    id: r.id,
                    title: r.title,
                    desc: r.desc,
                    icon: r.icon,
                    color: r.color,
                    href: `roadmap-detail.html?id=${r.id}`,
                  };
                  if (merged[cat]) merged[cat].push(card);
                  else {
                    if (!customCats[cat]) customCats[cat] = [];
                    customCats[cat].push(card);
                  }
                });
                return (
                  <>
                    <Section
                      title="Role-based Roadmaps"
                      items={merged["Role-based Roadmaps"]}
                      filterQuery={filterQuery}
                    />
                    <Section
                      title="Skill-based Roadmaps"
                      items={merged["Skill-based Roadmaps"]}
                      filterQuery={filterQuery}
                    />
                    {!filterQuery && (
                      <Section
                        title="Best Practices"
                        items={merged["Best Practices"]}
                        filterQuery={filterQuery}
                      />
                    )}
                    {Object.entries(customCats).map(([cat, items]) => (
                      <Section
                        key={cat}
                        title={cat}
                        items={items}
                        filterQuery={filterQuery}
                      />
                    ))}
                  </>
                );
              })()}
            </main>

            <Footer />
            <TweaksPanel
              visible={tweaksVisible}
              tweaks={tweaks}
              onChange={handleTweak}
            />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
